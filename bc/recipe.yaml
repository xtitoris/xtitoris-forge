context:
  version: "1.08.2"

package:
  name: bc
  version: ${{ version }}

source:
  - if: win
    then:
      url: https://ftpmirror.gnu.org/gnu/bc/bc-${{ version }}.tar.gz
      sha256: ae470fec429775653e042015edc928d07c8c3b2fc59765172a330d3d87785f86

build:
  number: 0
  skip:
    - not win
  script:
    - if: win
      then: |
        bash "%RECIPE_DIR%\build-win.sh"

requirements:
  build:
    - if: win
      then:
        - ${{ compiler("gcc") }}
        - m2-bash
        - m2-make
        - m2-texinfo
        - m2-gawk
        - m2-grep
        - m2-sed

tests:
  - script:
      - if: win
        then:
          - bc --version
          - echo 1+1 | bc
          - echo 1 1 + p | dc

about:
  homepage: https://www.gnu.org/software/bc/
  summary: Arbitrary precision numeric processing language.
  license: GPL-3.0-or-later
  license_file: COPYING
